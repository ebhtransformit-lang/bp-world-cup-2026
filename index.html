<!--
HOTFIX à coller dans index.html juste avant </body>
Corrections :
1) sauvegarde/restauration scores officiels admin, y compris 0-0
2) affichage heures CET/Paris
3) ouverture liens FIFA/équipes/stades/drapeaux dans nouvel onglet sans quitter le jeu
-->
<script>
(function BPWC_V75_HOTFIX(){
  'use strict';
  const SCORE_KEY = 'bpwc_official_scores_saved_v75';
  const PARIS_TZ = 'Europe/Paris';

  function safeJSONParse(v, fallback){ try { return JSON.parse(v); } catch(e){ return fallback; } }
  function qsa(sel, root=document){ return Array.prototype.slice.call(root.querySelectorAll(sel)); }
  function btnByText(txt){ return qsa('button').find(b => (b.textContent || '').trim() === txt); }

  function currentAdminScoreDay(){
    const el = document.getElementById('scoreEntryTitle') || document.getElementById('adminDay');
    const txt = el ? (el.textContent || '') : '';
    const m = txt.match(/journée\s*(\d+)|^(\d+)$/i);
    return String((m && (m[1] || m[2])) || (document.getElementById('adminDay')?.textContent || '1').trim() || '1');
  }

  function getScoreRows(){
    const box = document.getElementById('scoreInputs');
    if(!box) return [];
    return qsa('.score-row', box).map(row => {
      const selects = qsa('select', row);
      const label = (row.textContent || '').replace(/\s+/g,' ').trim();
      const idMatch = label.match(/\((M\d+)\)/i) || (selects[0]?.id || '').match(/(M\d+)/i);
      return { row, selects, matchId: idMatch ? idMatch[1].toUpperCase() : label };
    }).filter(x => x.selects.length >= 2);
  }

  function readOfficialScoresFromDom(){
    const day = currentAdminScoreDay();
    const scores = {};
    getScoreRows().forEach(({selects, matchId}) => {
      const homeRaw = selects[0].value;
      const awayRaw = selects[1].value;
      scores[matchId] = {
        home: homeRaw === '' ? null : Number(homeRaw),
        away: awayRaw === '' ? null : Number(awayRaw),
        saved: homeRaw !== '' && awayRaw !== '',
        savedAt: new Date().toISOString()
      };
    });
    return { day, scores };
  }

  function saveOfficialScores(){
    const payload = readOfficialScoresFromDom();
    const all = safeJSONParse(localStorage.getItem(SCORE_KEY), {});
    all[payload.day] = payload.scores;
    localStorage.setItem(SCORE_KEY, JSON.stringify(all));

    // Synchronisation opportuniste avec les structures globales fréquentes de l'app.
    try {
      const matches = window.matches || window.MATCHES || window.fixtures || [];
      if (Array.isArray(matches)) {
        matches.forEach(m => {
          const id = String(m.id || m.matchId || '').toUpperCase();
          const s = payload.scores[id];
          if (s && s.saved) {
            m.scoreA = s.home; m.scoreB = s.away;
            m.officialScoreA = s.home; m.officialScoreB = s.away;
            m.status = 'closed';
          }
        });
      }
      if (typeof window.saveState === 'function') window.saveState();
      if (typeof window.saveData === 'function') window.saveData();
    } catch(e) {}

    showHotfixNotice('✅ Scores officiels enregistrés, y compris les 0-0.');
  }

  function restoreOfficialScores(){
    const day = currentAdminScoreDay();
    const all = safeJSONParse(localStorage.getItem(SCORE_KEY), {});
    const scores = all[day] || {};
    getScoreRows().forEach(({selects, matchId}) => {
      const s = scores[matchId];
      if(!s) return;
      if(s.home !== null && s.home !== undefined){
        selects[0].value = String(s.home);
        selects[0].dispatchEvent(new Event('change', {bubbles:true}));
      }
      if(s.away !== null && s.away !== undefined){
        selects[1].value = String(s.away);
        selects[1].dispatchEvent(new Event('change', {bubbles:true}));
      }
    });
  }

  function clearOfficialScores(){
    const day = currentAdminScoreDay();
    const all = safeJSONParse(localStorage.getItem(SCORE_KEY), {});
    delete all[day];
    localStorage.setItem(SCORE_KEY, JSON.stringify(all));
  }

  function showHotfixNotice(msg){
    let n = document.getElementById('bpwcHotfixNotice');
    if(!n){
      n = document.createElement('div');
      n.id = 'bpwcHotfixNotice';
      n.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99999;background:#12351f;color:#b8ffd0;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 14px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.45);max-width:360px';
      document.body.appendChild(n);
    }
    n.textContent = msg;
    clearTimeout(n._t);
    n._t = setTimeout(()=>{ n.remove(); }, 2600);
  }

  function patchParisTimes(){
    // Ajoute clairement l'indication Paris/CET/CEST partout où une heure de match est affichée.
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
    const nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const parent = node.parentElement;
      if(!parent || ['SCRIPT','STYLE','TEXTAREA','OPTION'].includes(parent.tagName)) return;
      let txt = node.nodeValue;
      if(/\b\d{1,2}:\d{2}\b/.test(txt) && !/Paris|CET|CEST/.test(txt)){
        node.nodeValue = txt.replace(/\b(\d{1,2}:\d{2})\b/g, '$1 (heure de Paris)');
      }
    });
    qsa('[data-time],[data-match-time],.match-time,.match-card-meta span').forEach(el => {
      const t = el.textContent || '';
      if(/\b\d{1,2}:\d{2}\b/.test(t) && !/Paris|CET|CEST/.test(t)){
        el.textContent = t.replace(/\b(\d{1,2}:\d{2})\b/g, '$1 (heure de Paris)');
      }
    });
  }

  function patchNewTabLinks(){
    // Tous les liens externes (FIFA, Google Maps, équipes, stades, drapeaux) s'ouvrent en nouvel onglet.
    qsa('a[href]').forEach(a => {
      const href = a.getAttribute('href') || '';
      if(/^https?:\/\//i.test(href)){
        a.setAttribute('target','_blank');
        a.setAttribute('rel','noopener noreferrer');
      }
    });
  }

  document.addEventListener('click', function(e){
    const btn = e.target.closest('button');
    const label = btn ? (btn.textContent || '').trim() : '';

    if(label === 'Enregistrer les scores officiels'){
      setTimeout(saveOfficialScores, 0);
      setTimeout(restoreOfficialScores, 80);
      setTimeout(restoreOfficialScores, 300);
      return;
    }

    if(label === 'Calculer les gains de la journée' || label === 'Recalculer cette journée'){
      restoreOfficialScores();
      saveOfficialScores();
      return;
    }

    if(label === 'Remettre les scores à zéro'){
      clearOfficialScores();
      return;
    }

    const a = e.target.closest('a[href]');
    if(a){
      const href = a.getAttribute('href') || '';
      if(/^https?:\/\//i.test(href)){
        e.preventDefault();
        e.stopPropagation();
        window.open(href, '_blank', 'noopener,noreferrer');
      }
    }
  }, true);

  const rerun = () => { restoreOfficialScores(); patchParisTimes(); patchNewTabLinks(); };
  window.addEventListener('load', () => { setTimeout(rerun, 200); setTimeout(rerun, 1000); });
  document.addEventListener('DOMContentLoaded', () => { setTimeout(rerun, 100); });

  const mo = new MutationObserver(() => {
    clearTimeout(window.__bpwcHotfixTimer);
    window.__bpwcHotfixTimer = setTimeout(rerun, 120);
  });
  setTimeout(() => { if(document.body) mo.observe(document.body, {childList:true, subtree:true}); }, 500);
})();
</script>
